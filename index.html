<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AS Consultorias</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="tela-login">
  <div class="login-box">
    <h1>AS Consultorias</h1>

    <input id="email" type="email" placeholder="E-mail" />
    <input id="senha" type="password" placeholder="Senha" />

    <button id="btn-login">Entrar</button>
  </div>
</div>

<div id="tela-dashboard">

  <header>
    <div class="logo">Dashboard</div>
    <div>
      <span id="user-email"></span>
      <button id="btn-logout">Sair</button>
    </div>
  </header>

  <main>

    <section class="kpis">
      <div class="card">Taxa de cliente <span>–</span></div>
      <div class="card">Tempo médio <span>–</span></div>
      <div class="card">Cancelamentos <span>–</span></div>
      <div class="card">Avaliação média <span>–</span></div>
    </section>

    <section class="chat">
      <div id="chat-msgs">
        <div class="msg bot">Consultor IA pronto.</div>
      </div>

      <input id="chat-pergunta" placeholder="Pergunte algo..." />
      <button id="btn-enviar">Enviar</button>
    </section>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="app.js"></script>

</body>
</html>
